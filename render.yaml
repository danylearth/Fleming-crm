databases:
  - name: fleming-db
    databaseName: fleming
    user: fleming
    plan: free

services:
  - type: web
    name: fleming-crm-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleming-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
