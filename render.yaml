services:
  - type: web
    name: fleming-crm
    runtime: node
    plan: starter
    buildCommand: npm run render-build
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /data/fleming.db
      - key: UPLOADS_PATH
        value: /data/uploads
    disk:
      name: fleming-data
      mountPath: /data
      sizeGB: 1
