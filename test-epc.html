<!DOCTYPE html>
<html>
<head>
    <title>EPC API Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .result { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 20px; }
        button { background: #1a2332; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .success { color: #059669; }
        .error { color: #dc2626; }
        pre { background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🏛️ EPC API Test</h1>
    <p>Testing the EPC API integration with postcode <strong>SW1A 1AA</strong> (Westminster)</p>

    <button onclick="testEPC()">Test EPC API</button>

    <div id="result" class="result" style="display:none;">
        <h3>Result:</h3>
        <div id="output"></div>
    </div>

    <script>
        async function testEPC() {
            const resultDiv = document.getElementById('result');
            const outputDiv = document.getElementById('output');

            resultDiv.style.display = 'block';
            outputDiv.innerHTML = '<p>Loading...</p>';

            try {
                // Get token from localStorage (you should be logged in)
                const token = localStorage.getItem('token');

                if (!token) {
                    outputDiv.innerHTML = '<p class="error">❌ No auth token found. Please log in first at <a href="http://localhost:5173">http://localhost:5173</a></p>';
                    return;
                }

                const response = await fetch('http://localhost:3001/api/epc-lookup?postcode=SW1A1AA', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    outputDiv.innerHTML = `
                        <p class="success">✅ EPC API is working!</p>
                        <p>Found <strong>${data.length}</strong> EPC certificates for SW1A 1AA</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    outputDiv.innerHTML = `
                        <p class="error">❌ API Error: ${data.error || 'Unknown error'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                outputDiv.innerHTML = `
                    <p class="error">❌ Network Error: ${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
