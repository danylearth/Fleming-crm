app = "fleming-crm-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  UPLOADS_PATH = "/data/uploads"

[deploy]
  release_command = "node dist/migrate.js"

# Single machine by design: uploads live on this volume, and volumes are
# per-machine — scaling out requires moving uploads to object storage first
[mounts]
  source = "uploads_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
